name: Injurylog
options:
  bundleIdPrefix: com.shimondeitel.injurylog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Injurylog:
    type: application
    platform: iOS
    sources:
      - path: Injurylog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.injurylog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Injurylog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  InjurylogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: InjurylogTests
      - path: Injurylog.storekit
    dependencies:
      - target: Injurylog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.injurylog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  InjurylogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: InjurylogUITests
    dependencies:
      - target: Injurylog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.injurylog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Injurylog:
    build:
      targets:
        Injurylog: all
        InjurylogTests: [test]
        InjurylogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Injurylog.storekit
    test:
      config: Debug
      storeKitConfiguration: Injurylog.storekit
      targets:
        - InjurylogTests
        - InjurylogUITests
    archive:
      config: Release
